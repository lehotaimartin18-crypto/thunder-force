<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雷霆裂空 - Thunder Force</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0e27;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            width: 540px;
            height: 960px;
            background: linear-gradient(180deg, #1a1f3a 0%, #0f1428 50%, #1a0f2e 100%);
            border: 3px solid #00ffff;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            overflow: hidden;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }
        
        .hud {
            position: absolute;
            color: #00ffff;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
        }
        
        #score {
            top: 10px;
            left: 10px;
        }
        
        #health {
            top: 10px;
            right: 10px;
        }
        
        #radarPressure {
            top: 40px;
            left: 10px;
        }
        
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border: 2px solid #ff0080;
            border-radius: 10px;
            text-align: center;
            color: #00ffff;
            display: none;
            z-index: 200;
            pointer-events: auto;
        }
        
        #gameOver h1 {
            font-size: 32px;
            margin-bottom: 20px;
            color: #ff0080;
        }
        
        #gameOver p {
            font-size: 18px;
            margin: 10px 0;
        }
        
        #gameOver button {
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 16px;
            background: #00ffff;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        
        #gameOver button:hover {
            background: #00ff00;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <div id="score" class="hud">Score: 0</div>
            <div id="health" class="hud">HP: 100</div>
            <div id="radarPressure" class="hud">雷压: 0%</div>
        </div>
        <div id="gameOver">
            <h1>GAME OVER</h1>
            <p id="finalScore">最终得分: 0</p>
            <p id="waveInfo">波次: 0</p>
            <button onclick="location.reload()">重新开始</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
